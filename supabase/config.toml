# Supabase local dev configuration (equivalent of `supabase init` output).
# `supabase start` boots the full stack (Postgres, Auth, Realtime, Studio…) in
# Docker; `supabase db reset` applies migrations/ then runs seed SQL. See
# CLAUDE.md for the offline bootstrap. Requires the Supabase CLI + Docker.

project_id = "aim"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

# Email testing inbox (Inbucket) — auth/confirmation mails land here locally.
[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:5173"
additional_redirect_urls = ["http://127.0.0.1:5173"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# Google Workspace SSO — pending decision (see CLAUDE.md "Open items").
# Enable and supply credentials via env when confirmed.
# [auth.external.google]
# enabled = true
# client_id = "env(SUPABASE_AUTH_GOOGLE_CLIENT_ID)"
# secret = "env(SUPABASE_AUTH_GOOGLE_SECRET)"

[analytics]
enabled = false
