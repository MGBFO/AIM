# Netlify alternative to Vercel (either works; hosting is env-config only).
[build]
  command = "npm run build"
  publish = "web/dist"

# SPA fallback so client routing / refresh serves index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "22"
